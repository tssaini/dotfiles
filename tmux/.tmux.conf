# change the prefix from 'C-b' to 'C-a'
# (remap capslock to CTRL for easy access)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# start with window 1 (instead of 0)
set -g base-index 1

# start with pane 1
set -g pane-base-index 1

# reload config file
bind r source-file ~/.tmux.conf

# close current window without confirmation (prefix + q)
bind q kill-window

# renumber windows after closing one
set -g renumber-windows on

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

#set -g @plugin 'erikw/tmux-powerline'
set -g @plugin 'dracula/tmux'
#set -g @dracula-show-powerline true
#set -g @dracula-show-edge-icons true
#set -g @dracula-git-disable-status false
set -g @dracula-plugins "battery cwd git cpu-usage"
set -g @dracula-left-pad false
set -g @dracula-right-pad false
set -g @dracula-left-icon-padding 0


# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# place status bar at top (tmux supports top or bottom only)
set -g status-position bottom
# keep window list left-aligned
set -g status-justify left
